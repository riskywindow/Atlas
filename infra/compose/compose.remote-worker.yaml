services:
  remote-worker:
    image: switchyard/remote-worker:dev
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.remote-worker
    env_file:
      - ${SWITCHYARD_REMOTE_WORKER_ENV_FILE:-../../docs/examples/phase7_remote_worker_stub_worker.env}
    ports:
      - "8090:8090"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
