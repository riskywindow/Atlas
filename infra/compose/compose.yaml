name: switchyard-local

services:
  postgres:
    image: postgres:17-alpine
    profiles: ["optional"]
    environment:
      POSTGRES_DB: switchyard
      POSTGRES_USER: switchyard
      POSTGRES_PASSWORD: switchyard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switchyard -d switchyard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    profiles: ["optional"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    profiles: ["optional"]
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro

volumes:
  postgres-data:
