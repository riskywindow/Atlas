apiVersion: apps/v1
kind: Deployment
metadata:
  name: switchyard-gateway
  labels:
    app.kubernetes.io/name: switchyard-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: switchyard-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: switchyard-gateway
    spec:
      containers:
        - name: gateway
          image: localhost:5001/switchyard-control-plane:dev
          imagePullPolicy: Always
          args:
            - gateway
          envFrom:
            - configMapRef:
                name: switchyard-settings
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
