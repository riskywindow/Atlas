apiVersion: apps/v1
kind: Deployment
metadata:
  name: switchyard-remote-worker
  namespace: switchyard
labels:
  app.kubernetes.io/name: switchyard-remote-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: switchyard-remote-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: switchyard-remote-worker
    spec:
      containers:
        - name: remote-worker
          image: switchyard/remote-worker:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: SWITCHYARD_REMOTE_WORKER_PORT
              value: "8090"
            - name: SWITCHYARD_REMOTE_WORKER_WORKER_NAME
              value: "kind-stub-vllm-cuda-worker"
            - name: SWITCHYARD_REMOTE_WORKER_WORKER_ID
              value: "kind-stub-vllm-cuda-worker-1"
            - name: SWITCHYARD_REMOTE_WORKER_BACKEND_TYPE
              value: "vllm_cuda"
            - name: SWITCHYARD_REMOTE_WORKER_DEVICE_CLASS
              value: "nvidia_gpu"
            - name: SWITCHYARD_REMOTE_WORKER_ENGINE_TYPE
              value: "vllm"
            - name: SWITCHYARD_REMOTE_WORKER_MODEL_IDENTIFIER
              value: "meta-llama/Llama-3.1-8B-Instruct"
            - name: SWITCHYARD_REMOTE_WORKER_SERVING_TARGET
              value: "chat-shared"
            - name: SWITCHYARD_REMOTE_WORKER_CONTROL_PLANE_URL
              value: "http://switchyard-gateway.switchyard.svc.cluster.local:8000"
            - name: SWITCHYARD_REMOTE_WORKER_AUTH_MODE
              value: "static_token"
            - name: SWITCHYARD_REMOTE_WORKER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: switchyard-remote-worker-auth
                  key: registration-token
          readinessProbe:
            httpGet:
              path: /internal/worker/ready
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: switchyard-remote-worker
  namespace: switchyard
spec:
  selector:
    app.kubernetes.io/name: switchyard-remote-worker
  ports:
    - name: http
      port: 8090
      targetPort: http
